# Shared config for both Sofle halves (sofle.conf applies to _left and _right).

# --- RGB underglow ---
# LEDs are NOT installed yet, so underglow stays OFF.
# Leaving these commented out means the firmware never tries to drive the
# WS2812/SK6812 strip, and the board behaves like a non-RGB Sofle.
# When you solder the LEDs in, uncomment both lines and re-build:
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# --- Rotary encoders ---
# Also OFF for now. If/when you install the EC11 encoders, uncomment these.
# The keymap already has a sensor-bindings line ready for them.
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Power / battery (safe defaults) ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
